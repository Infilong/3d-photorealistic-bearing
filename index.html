<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photorealistic Rotating Bearing</title>
    <style>body { margin: 0; overflow: hidden; background-color: #ffffff; }</style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // 1. Core Renderer and Environment Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); 
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 65);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.toneMappingExposure = 1.2; 
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Generate HDR environment map
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;


        // ==========================================
        // 2. Advanced PBR Material System
        // ==========================================
        const polishedMetal = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,       
            metalness: 1.0,        
            roughness: 0.05,       
            envMapIntensity: 2.5,  
            clearcoat: 0.2,        
            clearcoatRoughness: 0.1
        });

        const brushedMetal = new THREE.MeshPhysicalMaterial({
            color: 0xdddddd,       
            metalness: 1.0,        
            roughness: 0.28,       
            envMapIntensity: 2.0
        });

        // 3. Geometry Assembly
        const assembly = new THREE.Group();
        assembly.rotation.z = -Math.PI / 2;
        assembly.rotation.x = Math.PI / 7;
        assembly.rotation.y = -Math.PI / 10;
        scene.add(assembly);

        // --- Core Geometry Benchmarks ---
        const N = 27;          
        const H_roller = 6.0;  
        const R_roller = 1.0;  
        const R_pitch = 11.0;  
        const TILT_ANGLE = 0.18; 

        // ==========================================
        // #1: Outer Ring
        // ==========================================
        const pts1 = [];
        const H1 = 7.0;
        pts1.push(new THREE.Vector2(11.0, -H1/2)); 
        pts1.push(new THREE.Vector2(13.0, -H1/2)); 
        pts1.push(new THREE.Vector2(13.0, H1/2));  
        pts1.push(new THREE.Vector2(12.3, H1/2));  
        pts1.push(new THREE.Vector2(11.0, -H1/2)); 
        const obj1 = new THREE.Mesh(new THREE.LatheGeometry(pts1, 64), polishedMetal);
        obj1.position.y = -15;
        assembly.add(obj1);

        // ==========================================
        // #3: Roller Array
        // ==========================================
        const obj3 = new THREE.Group();
        const rollerGeo = new THREE.CylinderGeometry(R_roller, R_roller, H_roller, 64);
        for(let i=0; i<N; i++) {
            let theta = i * (Math.PI * 2 / N);
            let roller = new THREE.Mesh(rollerGeo, polishedMetal);
            roller.position.set(R_pitch * Math.cos(theta), 0, R_pitch * Math.sin(theta));
            roller.rotation.y = -theta; 
            roller.rotation.z = -TILT_ANGLE; 
            obj3.add(roller);
        }
        obj3.position.y = 5;
        assembly.add(obj3);

        // ==========================================
        // #2: Cage
        // ==========================================
        const obj2 = new THREE.Group();
        const CAGE_THICKNESS = 0.25; 
        const CAGE_RAD_OFFSET = -0.4; 
        
        function getLathePoint(y, isOuter) {
            const baseR = R_pitch + CAGE_RAD_OFFSET + y * Math.tan(TILT_ANGLE);
            const thickOffset = (CAGE_THICKNESS / 2) / Math.cos(TILT_ANGLE);
            return new THREE.Vector2(baseR + (isOuter ? thickOffset : -thickOffset), y);
        }

        const ptsLeft = [
            getLathePoint(-3.8, false), getLathePoint(-3.8, true),
            getLathePoint(-3.0, true), getLathePoint(-3.0, false), getLathePoint(-3.8, false)
        ];
        obj2.add(new THREE.Mesh(new THREE.LatheGeometry(ptsLeft, 64), brushedMetal));

        const ptsRight = [
            getLathePoint(3.0, false), getLathePoint(3.0, true),
            getLathePoint(3.8, true), getLathePoint(3.8, false), getLathePoint(3.0, false)
        ];
        obj2.add(new THREE.Mesh(new THREE.LatheGeometry(ptsRight, 64), brushedMetal));

        const spanY = 7.6; 
        const strutLength = spanY / Math.cos(TILT_ANGLE); 
        const strutWidthTangential = 1.3; 
        
        const strutGeo = new THREE.BoxGeometry(strutWidthTangential, strutLength, CAGE_THICKNESS);

        for(let i=0; i<N; i++) {
            let theta = (i + 0.5) * (Math.PI * 2 / N);
            const pivot = new THREE.Group();
            pivot.rotation.y = -theta; 
            const strut = new THREE.Mesh(strutGeo, brushedMetal);
            strut.rotation.x = TILT_ANGLE; 
            strut.position.z = R_pitch + CAGE_RAD_OFFSET;
            pivot.add(strut);
            obj2.add(pivot);
        }
        obj2.position.y = -5;
        assembly.add(obj2);

        // ==========================================
        // #4: Inner Ring
        // ==========================================
        const pts4 = [];
        const H4 = 8.0;
        pts4.push(new THREE.Vector2(8.0, -H4/2));     
        pts4.push(new THREE.Vector2(9.5, -H4/2));     
        pts4.push(new THREE.Vector2(11.2, H4/2 - 1)); 
        pts4.push(new THREE.Vector2(12.5, H4/2 - 0.5)); 
        pts4.push(new THREE.Vector2(12.5, H4/2 + 0.5)); 
        pts4.push(new THREE.Vector2(8.0, H4/2 + 0.5));  
        pts4.push(new THREE.Vector2(8.0, -H4/2));     
        const obj4 = new THREE.Mesh(new THREE.LatheGeometry(pts4, 64), polishedMetal);
        obj4.position.y = 15;
        assembly.add(obj4);

        // ==========================================
        // [Core Engine]: Physical Time Clock and Perfect Rotation Engine
        // ==========================================
        const clock = new THREE.Clock(); // Instantiate global time generator
        const angularSpeed = 0.5; // Angular velocity (higher = faster)

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            
            // 1. Get physical delta time between frames
            const delta = clock.getDelta();
            
            // 2. Calculate rotation increment for this frame
            const step = angularSpeed * delta;
            
            // 3. Apply local rotation with modulo (wrapping at 2PI)
            // This ensures numerical stability over long periods of time.
            obj1.rotation.y = (obj1.rotation.y + step) % (Math.PI * 2);
            obj2.rotation.y = (obj2.rotation.y + step) % (Math.PI * 2);
            obj3.rotation.y = (obj3.rotation.y + step) % (Math.PI * 2);
            obj4.rotation.y = (obj4.rotation.y + step) % (Math.PI * 2);

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
